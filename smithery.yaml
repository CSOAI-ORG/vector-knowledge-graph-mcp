name: vector-knowledge-graph-mcp
description: AI-powered vector knowledge graph MCP server for agents. Supports add
  node, add edge, semantic node search. By MEOK AI Labs.
version: 1.0.0
tools:
- name: add_node
  description: Add a node to the knowledge graph with properties, embeddings, and
    metadata.
  parameters:
  - name: label
    type: string
    required: true
  - name: properties
    type: object
    required: true
  - name: node_id
    type: string
    required: false
- name: add_edge
  description: Create a directed edge between two nodes with relationship type and
    weight.
  parameters:
  - name: from_id
    type: string
    required: true
  - name: to_id
    type: string
    required: true
  - name: relation
    type: string
    required: true
  - name: weight
    type: number
    required: false
- name: semantic_node_search
  description: Search for nodes using semantic similarity matching against stored
    embeddings.
  parameters:
  - name: query
    type: string
    required: true
  - name: top_k
    type: integer
    required: false
- name: trace_compliance_chain
  description: Trace the compliance chain from a requirement through controls to evidence.
  parameters:
  - name: start_node_id
    type: string
    required: true
  - name: max_depth
    type: integer
    required: false
- name: find_gaps
  description: Find gaps in the knowledge graph where expected relationships or nodes
    are missing.
  parameters:
  - name: required_frameworks
    type: array
    required: true
